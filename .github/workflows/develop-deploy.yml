name: Deploy Frontend MIRÓ Develop

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.14.0'

    - name: Install OpenConnect and sshpass
      run: sudo apt-get install -y openconnect sshpass

    - name: Connect to VPN
      run: |
        echo "${{ secrets.VPN_PASSWORD }}" | sudo openconnect \
          --protocol=gp \
          --user="${{ secrets.VPN_USER }}" \
          --passwd-on-stdin \
          --servercert pin-sha256:+4XOhCB4GmaXr8/TMWL09EayWRbrz3X8WWAWgu79f9U= \
          "${{ secrets.VPN_HOST }}" -b

    - name: Wait for VPN tunnel
      run: |
        for i in $(seq 1 15); do
          ip a | grep -E "tun|gpd|pan|ppp" && echo "VPN interface found" && break
          echo "  attempt $i/15..."
          sleep 3
        done

    - name: Test SSH connectivity
      run: |
        for i in 1 2 3; do
          sshpass -p "${{ secrets.INTERNAL_SSH_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=20 \
            -o ServerAliveCountMax=30 \
            ${{ secrets.INTERNAL_USER }}@${{ secrets.INTERNAL_RESOURCE_IP }} \
            'echo "SSH OK"' && break
          echo "  SSH attempt $i failed, retrying..."
          sleep 5
        done

    - name: Create deploy script
      run: |
        cat > /tmp/deploy_front.sh << 'SCRIPT'
        #!/bin/bash
        echo "=== 1. Actualizar codigo ==="
        cd ~/MIRO_TEST
        if [ ! -d "Front_Miro_Test/.git" ]; then
          git clone --depth=1 --branch develop https://github.com/BrayanD117/Front_Miro.git Front_Miro_Test
        else
          cd Front_Miro_Test
          [ -f .env ] && cp .env /tmp/front_dev.env
          git fetch --depth=1 origin develop
          git reset --hard origin/develop
          [ -f /tmp/front_dev.env ] && cp /tmp/front_dev.env .env
          cd ..
        fi
        echo "=== 2. Instalar dependencias ==="
        cd ~/MIRO_TEST/Front_Miro_Test || exit 1
        sed -i "s/ = /=/g" .env 2>/dev/null || true
        node -e "var fs=require('fs'),p=JSON.parse(fs.readFileSync('package.json'));if(!p.version||!/^[0-9]/.test(p.version)){p.version='1.0.0';fs.writeFileSync('package.json',JSON.stringify(p,null,2));console.log('version corregida');}else{console.log('version ok:',p.version);}" 2>/dev/null || true
        rm -f package-lock.json
        npm install --legacy-peer-deps || exit 1
        echo "=== 3. Build ==="
        npm run build || exit 1
        echo "=== 4. Reload PM2 ==="
        pm2 describe Front_Dev > /dev/null 2>&1
        if [ $? -eq 0 ]; then
          echo "Front_Dev existe, haciendo reload..."
          pm2 reload Front_Dev --update-env
        else
          echo "Front_Dev no existe, iniciando..."
          cd ~/MIRO_TEST/Front_Miro_Test
          PORT=3001 pm2 start npm --name "Front_Dev" -- start
        fi
        pm2 save
        echo "=== Deploy completo ==="
        SCRIPT
        chmod +x /tmp/deploy_front.sh

    - name: Copy and run deploy script
      env:
        SSH_PASS: ${{ secrets.INTERNAL_SSH_PASSWORD }}
        SSH_USER: ${{ secrets.INTERNAL_USER }}
        SSH_HOST: ${{ secrets.INTERNAL_RESOURCE_IP }}
      run: |
        sshpass -p "$SSH_PASS" scp \
          -o StrictHostKeyChecking=no \
          /tmp/deploy_front.sh "$SSH_USER@$SSH_HOST:/tmp/deploy_front.sh"
        sshpass -p "$SSH_PASS" ssh \
          -o StrictHostKeyChecking=no \
          -o ConnectTimeout=20 \
          -o ServerAliveInterval=20 \
          -o ServerAliveCountMax=60 \
          "$SSH_USER@$SSH_HOST" "bash /tmp/deploy_front.sh"

    - name: Run Semantic Release
      working-directory: ./
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npx semantic-release

    - name: Post deploy
      run: echo "Development deployment complete"