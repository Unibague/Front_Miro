name: Deploy Frontend MIRÓ Develop

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.14.0'

    - name: Install OpenConnect and sshpass
      run: sudo apt-get install -y openconnect sshpass

    - name: Connect to VPN and deploy
      env:
        VPN_PASSWORD: ${{ secrets.VPN_PASSWORD }}
        VPN_USER: ${{ secrets.VPN_USER }}
        VPN_HOST: ${{ secrets.VPN_HOST }}
        SSH_PASS: ${{ secrets.INTERNAL_SSH_PASSWORD }}
        SSH_USER: ${{ secrets.INTERNAL_USER }}
        SSH_HOST: ${{ secrets.INTERNAL_RESOURCE_IP }}
      run: |
        # 1. Conectar VPN forzando gateway interno
        echo "$VPN_PASSWORD" | sudo openconnect \
          --protocol=gp \
          --user="$VPN_USER" \
          --passwd-on-stdin \
          --servercert pin-sha256:+4XOhCB4GmaXr8/TMWL09EayWRbrz3X8WWAWgu79f9U= \
          --os=win \
          "$VPN_HOST" -b

        # 2. Esperar que el túnel levante
        echo "Waiting for VPN tunnel..."
        for i in $(seq 1 15); do
          ip a | grep -E "tun|gpd|pan|ppp" && echo "VPN interface found" && break
          echo "  attempt $i/15..."
          sleep 3
        done
        ip route

        # 3. Verificar conectividad TCP con reintentos
        echo "Checking TCP port 22..."
        for i in 1 2 3 4 5; do
          timeout 15 bash -c "</dev/tcp/$SSH_HOST/22" && echo "TCP 22 reachable" && break
          echo "  TCP attempt $i failed, waiting 10s..."
          sleep 10
        done

        # 4. Todo el trabajo SSH en una sola conexión
        sshpass -p "$SSH_PASS" ssh \
          -o StrictHostKeyChecking=no \
          -o ConnectTimeout=20 \
          -o ServerAliveInterval=20 \
          -o ServerAliveCountMax=30 \
          "$SSH_USER@$SSH_HOST" '
            set -e
            echo "=== Stopping PM2 process ==="
            pm2 stop Front_Dev || echo "Front_Dev not running"
            pm2 delete Front_Dev || echo "Front_Dev not found"

            echo "=== Updating repository ==="
            cd ~/MIRO_TEST
            if [ ! -d "Front_Miro_Test" ]; then
              git clone --depth=1 --branch develop https://github.com/BrayanD117/Front_Miro.git Front_Miro_Test
            fi
            cd Front_Miro_Test
            git fetch --depth=1 origin develop
            git reset --hard origin/develop

            echo "=== Fixing env and building ==="
            sed -i "s/ = /=/g" .env
            npm install
            npm run build

            echo "=== Starting PM2 ==="
            PORT=3001 pm2 start npm --name "Front_Dev" -- start
            pm2 save

            echo "=== Deploy complete ==="
          '

    - name: Run Semantic Release
      working-directory: ./
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npx semantic-release

    - name: Post deploy
      run: echo "Development deployment complete"
