name: Deploy Frontend MIRÓ Develop

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.14.0'

    - name: Install OpenConnect
      run: sudo apt-get install -y openconnect

    - name: Install sshpass
      run: sudo apt-get install -y sshpass

    - name: Connect to VPN
      run: |
        echo "${{ secrets.VPN_PASSWORD }}" | sudo openconnect \
          --protocol=gp \
          --user=${{ secrets.VPN_USER }} \
          --passwd-on-stdin \
          --servercert pin-sha256:+4XOhCB4GmaXr8/TMWL09EayWRbrz3X8WWAWgu79f9U= \
          ${{ secrets.VPN_HOST }} -b


    - name: Verify VPN connection
      run: ip a

    - name: List network routes
      run: ip route

    - name: Test internal connectivity with SSH
      run: |
        sshpass -p "${{ secrets.INTERNAL_SSH_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.INTERNAL_USER }}@${{ secrets.INTERNAL_RESOURCE_IP }} 'echo "SSH connection successful"'
        
    - name: Update repository on remote server
      run: |
        sshpass -p "${{ secrets.INTERNAL_SSH_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.INTERNAL_USER }}@${{ secrets.INTERNAL_RESOURCE_IP }} '
          set -e;
          echo "Checking PM2 processes...";
          pm2 list | grep Front_Dev && pm2 stop Front_Dev || true;
          pm2 list | grep Front_Dev && pm2 delete Front_Dev || true;
          cd ~/MIRO_TEST;
          echo "Backing up .env...";
          [ -f Front_Miro_Test/.env ] && cp Front_Miro_Test/.env /tmp/front_dev.env && echo "Backup OK" || echo "No .env to backup";
          echo "Removing old directory...";
          rm -rf Front_Miro_Test;
          echo "Cloning repository...";
          git clone --branch develop https://x-access-token:${{ secrets.GIT_TOKEN }}@github.com/Unibague/Front_Miro.git Front_Miro_Test;
          echo "Verifying clone...";
          ls Front_Miro_Test/package.json;
          echo "Restoring .env...";
          [ -f /tmp/front_dev.env ] && cp /tmp/front_dev.env Front_Miro_Test/.env && echo "Env restored" || echo "No .env backup found";
          echo "Repository ready"'

    - name: Fix environment and build
      run: |
        sshpass -p "${{ secrets.INTERNAL_SSH_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.INTERNAL_USER }}@${{ secrets.INTERNAL_RESOURCE_IP }} '
          cd ~/MIRO_TEST/Front_Miro_Test;
          echo "=== FIXING ENV FILE FORMAT ===";
          sed -i "s/ = /=/g" .env;
          echo "=== FIXED ENV FILE ===";
          cat .env | grep -E "(API|NODE_TLS)";
          echo "=== TESTING VARIABLE LOADING ===";
          export $(cat .env | grep -v "^#" | xargs);
          echo "NEXT_PUBLIC_API_URL: $NEXT_PUBLIC_API_URL";
          npm install --legacy-peer-deps;
          echo "=== BUILD OUTPUT ===";
          npm run build'

    - name: Start PM2 process
      run: |
        sshpass -p "${{ secrets.INTERNAL_SSH_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.INTERNAL_USER }}@${{ secrets.INTERNAL_RESOURCE_IP }} '
          cd ~/MIRO_TEST/Front_Miro_Test;
          
          # Start PM2 with fixed port 3001 (already configured in nginx)
          PORT=3001 pm2 start npm --name "Front_Dev" -- start;
          pm2 save;
          
          echo "Front_Dev started successfully on port 3001"'

    - name: Run Semantic Release
      working-directory: ./    
      env:
        GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
      run: npx semantic-release

    - name: Post Checkout repository
      run: echo "Development deployment complete"