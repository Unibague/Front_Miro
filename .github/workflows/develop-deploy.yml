name: Deploy Frontend MIRÓ Develop

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.14.0'

    - name: Install OpenConnect and sshpass
      run: sudo apt-get install -y openconnect sshpass

    - name: Connect to VPN
      run: |
        echo "${{ secrets.VPN_PASSWORD }}" | sudo openconnect \
          --protocol=gp \
          --user="${{ secrets.VPN_USER }}" \
          --passwd-on-stdin \
          --servercert pin-sha256:+4XOhCB4GmaXr8/TMWL09EayWRbrz3X8WWAWgu79f9U= \
          "${{ secrets.VPN_HOST }}" -b

    - name: Wait for VPN tunnel
      run: |
        for i in $(seq 1 15); do
          ip a | grep -E "tun|gpd|pan|ppp" && echo "VPN interface found" && break
          echo "  attempt $i/15..."
          sleep 3
        done

    - name: Test SSH connectivity
      run: |
        for i in 1 2 3; do
          sshpass -p "${{ secrets.INTERNAL_SSH_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=20 \
            -o ServerAliveCountMax=30 \
            ${{ secrets.INTERNAL_USER }}@${{ secrets.INTERNAL_RESOURCE_IP }} \
            'echo "SSH OK"' && break
          echo "  SSH attempt $i failed, retrying..."
          sleep 5
        done

    - name: Deploy zero-downtime
      run: |
        sshpass -p "${{ secrets.INTERNAL_SSH_PASSWORD }}" ssh \
          -o StrictHostKeyChecking=no \
          -o ConnectTimeout=20 \
          -o ServerAliveInterval=20 \
          -o ServerAliveCountMax=60 \
          ${{ secrets.INTERNAL_USER }}@${{ secrets.INTERNAL_RESOURCE_IP }} '
            set -e

            echo "=== 1. Actualizar código ==="
            cd ~/MIRO_TEST
            if [ ! -d "Front_Miro_Test/.git" ]; then
              echo "Clonando repositorio por primera vez..."
              git clone --depth=1 --branch develop https://github.com/BrayanD117/Front_Miro.git Front_Miro_Test
            else
              cd Front_Miro_Test
              # Backup del .env antes del reset
              [ -f .env ] && cp .env /tmp/front_dev.env
              git fetch --depth=1 origin develop
              git reset --hard origin/develop
              # Restaurar .env
              [ -f /tmp/front_dev.env ] && cp /tmp/front_dev.env .env
              cd ..
            fi

            echo "=== 2. Instalar dependencias ==="
            cd ~/MIRO_TEST/Front_Miro_Test
            sed -i "s/ = /=/g" .env 2>/dev/null || true
            # Asegurar que package.json tenga version válida antes de npm install
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
              if (!pkg.version || !/^\\d+\\.\\d+\\.\\d+/.test(pkg.version)) {
                pkg.version = '1.0.0';
                fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
                console.log('package.json version corregida a 1.0.0');
              } else {
                console.log('package.json version OK:', pkg.version);
              }
            "
            npm install --prefer-offline 2>/dev/null || npm install --legacy-peer-deps

            echo "=== 3. Build (servidor sigue corriendo) ==="
            npm run build

            echo "=== 4. Reload PM2 sin downtime ==="
            if pm2 list | grep -q "Front_Dev"; then
              pm2 reload Front_Dev --update-env || pm2 restart Front_Dev
            else
              PORT=3001 pm2 start npm --name "Front_Dev" -- start
            fi
            pm2 save

            echo "=== Deploy completo ==="
          '

    - name: Run Semantic Release
      working-directory: ./
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npx semantic-release

    - name: Post deploy
      run: echo "Development deployment complete"
